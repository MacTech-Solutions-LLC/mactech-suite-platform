name: Agent Triggers Cron

# Slice 5.8: external scheduler that pokes the AgentOps cron tick
# endpoint every 5 minutes (GitHub Actions' minimum cron resolution).
# For hourly / daily / weekly triggers this is plenty; sub-5-minute
# triggers will fire up to ~4 minutes late — acceptable for v1.
#
# The endpoint authenticates via Authorization: Bearer $CRON_SECRET.
# CRON_SECRET must be set BOTH on Railway (so the endpoint accepts it)
# AND in GitHub Actions secrets (so this workflow can send it).
# Mismatch = the tick endpoint returns 401 and triggers stop firing
# until the secrets match again.

on:
  schedule:
    # Every 5 minutes. GitHub Actions clamps this; ticks may run with
    # minor delay during peak load. Don't expect strict sub-minute
    # accuracy — if you need that, use Railway cron instead.
    - cron: "*/5 * * * *"
  # Manual dispatch from the Actions UI for ad-hoc fires + smoke tests.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tick:
    name: Poke /api/cron/agent-triggers
    runs-on: ubuntu-latest
    steps:
      - name: POST cron tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set in this repository — refusing to fire."
            exit 1
          fi
          # -fSs: fail-on-non-2xx + show-errors; -w prints the http status
          # to stdout for run-history visibility. Body is captured separately.
          BODY=$(mktemp)
          STATUS=$(curl -sS -o "$BODY" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "https://www.suite.mactechsolutionsllc.com/api/cron/agent-triggers")
          echo "HTTP $STATUS"
          # Truncate body to keep the run log readable; full payload is
          # stored on the AgentRun rows the tick produced anyway.
          head -c 4000 "$BODY"
          echo ""
          # Treat 200 as success; everything else is a workflow failure
          # so the GitHub Actions failure-notification path catches it.
          if [ "$STATUS" != "200" ]; then
            exit 1
          fi
