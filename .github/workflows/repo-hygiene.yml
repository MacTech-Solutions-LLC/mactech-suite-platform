name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  safe-checks:
    name: Safe repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repo hygiene script
        shell: pwsh
        run: ./scripts/check-repo-hygiene.ps1
