name: Risk Review
description: Capture security, data, operational, or governance risk review notes.
title: "[Risk Review]: "
labels:
  - type:risk-review
  - status:backlog
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the change, decision, or concern being reviewed.
    validations:
      required: true
  - type: dropdown
    id: risk_area
    attributes:
      label: Primary risk area
      options:
        - risk:security
        - risk:data-handling
        - risk:operations
        - risk:governance
        - risk:architecture
        - compliance:review-needed
        - risk:other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the initial priority for triage.
      options:
        - priority:p2-normal
        - priority:p0-blocker
        - priority:p1-high
        - priority:p3-low
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Describe potential impact and affected repository areas.
    validations:
      required: true
  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation or decision
      description: Describe proposed mitigation, accepted risk, or next action.
    validations:
      required: true
  - type: textarea
    id: closing_evidence
    attributes:
      label: Closing evidence
      description: Link the pull request, review note, decision record, or test run used to close this review.
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This review does not include secrets, credentials, tokens, or customer data.
          required: true
        - label: This review does not make production or certification claims.
          required: true
